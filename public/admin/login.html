<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Dulce Valentina</title>
    <link rel="icon" href="/logo.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Plus+Jakarta+Sans:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fdf8f8;
            color: #3d2b2b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .font-fancy { font-family: 'Dancing Script', cursive; }
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(214, 51, 132, 0.1);
            box-shadow: 0 20px 40px -15px rgba(214, 51, 132, 0.15);
        }
        .input-field {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            border: 1px solid #f0e6e6;
            background: white;
            transition: all 0.3s ease;
            outline: none;
        }
        .input-field:focus {
            border-color: #d63384;
            box-shadow: 0 0 0 4px rgba(214, 51, 132, 0.1);
        }
        .btn-primary {
            background-color: #d63384;
            color: white;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #c02874;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(214, 51, 132, 0.4);
        }
    </style>
</head>
<body>

    <div class="glass p-10 rounded-[2rem] w-full max-w-md mx-4 relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-[#d63384] rounded-full blur-3xl opacity-10"></div>
        
        <div class="text-center mb-8">
            <img src="/logo.png" alt="Logo" class="h-16 mx-auto mb-4 object-contain">
            <h1 class="font-fancy text-3xl text-[#d63384]">Dulce Valentina</h1>
            <p class="text-xs uppercase tracking-widest opacity-50 mt-2 font-bold">Panel de Control</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <input type="text" id="username" class="input-field text-sm" placeholder="Usuario" required>
            </div>
            <div>
                <input type="password" id="password" class="input-field text-sm" placeholder="Contraseña" required>
            </div>
            
            <div id="errorMsg" class="text-red-500 text-xs text-center hidden">Credenciales inválidas</div>
            
            <button type="submit" class="btn-primary w-full py-4 rounded-xl text-xs font-bold uppercase tracking-widest mt-4">
                Iniciar Sesión
            </button>
        </form>
        
        <div class="mt-8 text-center">
            <a href="/" class="text-[10px] uppercase tracking-widest opacity-40 hover:opacity-100 hover:text-[#d63384] transition-colors">
                ← Volver al catálogo
            </a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('errorMsg');
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                
                if (res.ok) {
                    window.location.href = '/admin/';
                } else {
                    err.classList.remove('hidden');
                }
            } catch (error) {
                err.classList.remove('hidden');
            }
        });

        // Check if already logged in
        fetch('/api/check-auth').then(r => r.json()).then(data => {
            if(data.authenticated) window.location.href = '/admin/';
        });
    </script>
</body>
</html>
